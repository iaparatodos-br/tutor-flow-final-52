name: Database Migrations

on:
  push:
    branches:
      - main
      - staging

jobs:
  migrate:
    runs-on: ubuntu-latest

    # Aqui está a mudança chave: o environment é determinado
    # dinamicamente com base no branch que recebeu o push.
    # 'main' usa o environment 'production', qualquer outro usa 'development'.
    environment: ${{ github.ref_name == 'main' && 'production' || 'development' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link Supabase project
        # PROJECT_REF e DB_PASSWORD agora vêm do environment correto automaticamente.
        # O GitHub injeta os secrets do environment declarado acima — não há
        # mais necessidade do bloco 'if' que usávamos antes para diferenciar.
        run: supabase link --project-ref ${{ secrets.PROJECT_REF }} --password ${{ secrets.DB_PASSWORD }}
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      # This step reconciles the mismatch between your local migration files
      # and the long history already recorded on the remote database.
      # It tells the CLI: "all these remote migrations are already reflected
      # in my local snapshot — treat them as applied and move on."
      # This is a one-time fix. After the first successful run you can remove it.
      - name: Repair migration history
        run: |
          supabase migration repair --status applied \
